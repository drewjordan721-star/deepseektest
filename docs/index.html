<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI Assistant Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-wrapper {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }

        .message.user .message-wrapper {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-wrapper {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 0.7rem;
            margin-top: 5px;
            opacity: 0.6;
        }

        .message.user .message-time {
            text-align: right;
        }

        .message-actions {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .retry-btn {
            background: none;
            border: none;
            color: #667eea;
            font-size: 0.75rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .retry-btn:hover {
            background: #f0f0f0;
        }

        .pending .message-wrapper {
            opacity: 0.6;
        }

        .pending::after {
            content: '•••';
            position: absolute;
            right: 10px;
            bottom: 5px;
            font-size: 12px;
            color: #999;
        }

        .image-preview {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            resize: none;
            font-family: inherit;
            font-size: 1rem;
            max-height: 120px;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .image-upload {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            align-items: center;
        }

        .upload-btn {
            background: #f0f0f0;
            color: #666;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .image-preview-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .preview-item {
            position: relative;
            display: inline-block;
        }

        .preview-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .remove-img {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }

        .status {
            text-align: center;
            font-size: 0.8rem;
            padding: 8px;
            background: #fff3cd;
            color: #856404;
            border-radius: 8px;
            margin: 10px;
            display: none;
        }

        .status.active {
            display: block;
        }

        .workflow-info {
            padding: 12px 20px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            font-size: 0.75rem;
            color: #666;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>AI Assistant</h1>
            <p>Powered by Advanced AI - Ask me anything!</p>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="message-wrapper">
                    Hello! I'm your AI assistant. How can I help you today? You can also upload images for me to analyze!
                </div>
                <div class="message-time">Just now</div>
            </div>
        </div>

        <div class="chat-input-container">
            <div class="image-upload">
                <button class="upload-btn" id="uploadBtn">📷 Upload Image</button>
                <input type="file" id="imageInput" multiple accept="image/*" style="display: none;">
                <span style="font-size: 0.75rem; color: #666;">Max 5 images</span>
            </div>
            <div id="imagePreviewList" class="image-preview-list"></div>
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Type your message..." rows="1"></textarea>
                <button id="sendButton">Send</button>
            </div>
        </div>
        
        <div class="status" id="status">Processing your request...</div>
        <div class="workflow-info">
            <span>🤖 AI Assistant</span>
            <span>Ready</span>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');
        const status = document.getElementById('status');
        const imageInput = document.getElementById('imageInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const imagePreviewList = document.getElementById('imagePreviewList');
        
        // UPDATED WEBHOOK URL
        const WEBHOOK_URL = 'https://bayal.app.n8n.cloud/webhook/ai-agent-endpoint';
        
        let selectedImages = []; // Store base64 images

        uploadBtn.addEventListener('click', () => {
            imageInput.click();
        });

        imageInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (selectedImages.length + files.length > 5) {
                status.textContent = 'Maximum 5 images allowed';
                status.classList.add('active');
                setTimeout(() => status.classList.remove('active'), 3000);
                return;
            }

            for (const file of files) {
                if (file.type.startsWith('image/')) {
                    const base64 = await fileToBase64(file);
                    selectedImages.push({
                        name: file.name,
                        base64: base64,
                        type: file.type
                    });
                }
            }
            updateImagePreview();
            imageInput.value = '';
        });

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function updateImagePreview() {
            imagePreviewList.innerHTML = '';
            selectedImages.forEach((img, index) => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                const imgElement = document.createElement('img');
                imgElement.src = img.base64;
                imgElement.className = 'preview-img';
                const removeBtn = document.createElement('div');
                removeBtn.className = 'remove-img';
                removeBtn.innerHTML = '×';
                removeBtn.onclick = () => {
                    selectedImages.splice(index, 1);
                    updateImagePreview();
                };
                div.appendChild(imgElement);
                div.appendChild(removeBtn);
                imagePreviewList.appendChild(div);
            });
        }

        function addMessage(content, isUser, images = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper';
            
            if (images && images.length > 0) {
                images.forEach(img => {
                    const imgElement = document.createElement('img');
                    imgElement.src = img.base64;
                    imgElement.className = 'image-preview';
                    wrapper.appendChild(imgElement);
                });
            }
            
            const textDiv = document.createElement('div');
            textDiv.textContent = content;
            wrapper.appendChild(textDiv);
            
            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = new Date().toLocaleTimeString();
            
            messageDiv.appendChild(wrapper);
            messageDiv.appendChild(timeDiv);
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return messageDiv;
        }

        function addTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            
            const wrapper = document.createElement('div');
            wrapper.className = 'typing-indicator';
            
            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('span');
                wrapper.appendChild(dot);
            }
            
            typingDiv.appendChild(wrapper);
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function retryMessage(message, images, originalMessageId) {
            // Remove the failed message and resend
            const failedMsg = document.querySelector(`[data-message-id="${originalMessageId}"]`);
            if (failedMsg) failedMsg.remove();
            await sendMessageToWebhook(message, images);
        }

        async function sendMessageToWebhook(message, images) {
            const messageId = Date.now().toString();
            const userMessageDiv = addMessage(message, true, images);
            userMessageDiv.setAttribute('data-message-id', messageId);
            userMessageDiv.classList.add('pending');
            
            addTypingIndicator();
            
            try {
                const payload = {
                    message: message,
                    images: images ? images.map(img => ({
                        base64: img.base64,
                        type: img.type,
                        name: img.name
                    })) : []
                };
                
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                removeTypingIndicator();
                
                // Remove pending class from user message
                userMessageDiv.classList.remove('pending');
                
                // Add assistant response
                const assistantMessage = data.response || data.message || "I've received your message! How can I help you further?";
                addMessage(assistantMessage, false);
                
                status.textContent = 'Message sent successfully!';
                status.classList.add('active');
                setTimeout(() => {
                    status.classList.remove('active');
                    status.textContent = 'Processing your request...';
                }, 2000);
                
            } catch (error) {
                console.error('Error:', error);
                removeTypingIndicator();
                
                // Mark the pending message as failed and add retry button
                const failedMsg = document.querySelector(`[data-message-id="${messageId}"]`);
                if (failedMsg) {
                    failedMsg.classList.remove('pending');
                    // Add retry button to failed message
                    const wrapper = failedMsg.querySelector('.message-wrapper');
                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'message-actions';
                    
                    const retryBtn = document.createElement('button');
                    retryBtn.className = 'retry-btn';
                    retryBtn.innerHTML = '↻ Retry';
                    retryBtn.onclick = () => retryMessage(message, images, messageId);
                    
                    actionsDiv.appendChild(retryBtn);
                    wrapper.appendChild(actionsDiv);
                }
                
                status.textContent = 'Failed to send. Click retry to try again.';
                status.classList.add('active');
                setTimeout(() => {
                    status.classList.remove('active');
                    status.textContent = 'Processing your request...';
                }, 3000);
                
            } finally {
                userInput.disabled = false;
                sendButton.disabled = false;
                userInput.focus();
            }
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message && selectedImages.length === 0) return;
            
            sendButton.disabled = true;
            userInput.disabled = true;
            
            const imagesToSend = [...selectedImages];
            selectedImages = [];
            updateImagePreview();
            
            await sendMessageToWebhook(message, imagesToSend);
            
            userInput.value = '';
            userInput.style.height = 'auto';
            sendButton.disabled = false;
            userInput.disabled = false;
            userInput.focus();
        }

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // No Enter key handler - rely on Send button for all platforms
        // This allows mobile return key to insert new line naturally

        sendButton.addEventListener('click', sendMessage);
        userInput.focus();

        document.querySelector('.workflow-info span:last-child').textContent = 'Ready';
    </script>
</body>
</html>

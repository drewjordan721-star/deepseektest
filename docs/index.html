<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>AI Automation Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #e6e9f0;  /* Soft gray-blue for eye comfort */
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fafafc;  /* Soft off-white background */
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            height: calc(100vh - 24px);
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #f0f2f5;  /* Soft neutral background */
            padding: 20px 25px;
            border-bottom: 1px solid #d0d5dd;
            flex-shrink: 0;
        }

        .header h1 {
            color: #1e2a3a;  /* Dark blue-gray for better contrast */
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            color: #4a5a6e;  /* Softer dark blue-gray */
            font-size: 16px;
        }

        .chat-container {
            padding: 20px;
            background: #fafafc;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            min-height: 0;
            scrollbar-width: thin;
            scrollbar-color: #b0b8c5 #e8ecf0;
        }

        .messages::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-track {
            background: #e8ecf0;
            border-radius: 10px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #b0b8c5;
            border-radius: 10px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        @media (max-width: 600px) {
            .message {
                max-width: 90%;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
        }

        .bot-message {
            align-self: flex-start;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
        }

        .message-content {
            padding: 16px 20px;
            border-radius: 24px;
            font-size: 18px;
            line-height: 1.5;
            word-wrap: break-word;
            font-weight: 400;
        }

        /* Eye-care friendly colors */
        .user-message .message-content {
            background: #d4e0f0;  /* Soft blue with good contrast */
            color: #1a2634;  /* Dark blue-gray for readability */
            border-bottom-right-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .bot-message .message-content {
            background: #eef2f6;  /* Very soft gray-blue */
            color: #1e2a3a;  /* Dark blue-gray */
            border-bottom-left-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .message-images {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .message-image {
            width: 100%;
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid transparent;
            object-fit: cover;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        @media (max-width: 600px) {
            .message-image {
                max-width: 160px;
                max-height: 160px;
            }
        }

        .message-image:hover {
            transform: scale(1.03);
        }

        .file-attachment {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: rgba(0,0,0,0.04);
            border-radius: 12px;
            margin-top: 8px;
            font-size: 16px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .user-message .file-attachment {
            background: rgba(255,255,255,0.2);
            color: #1a2634;
        }

        .file-icon {
            font-size: 20px;
        }

        .file-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 500;
        }

        .file-size {
            color: #4a5a6e;
            font-size: 14px;
        }

        .timestamp {
            font-size: 13px;
            color: #6b7a8f;  /* Softer gray-blue */
            margin-top: 6px;
            margin-bottom: 4px;
            font-weight: 400;
        }

        .user-message .timestamp {
            text-align: right;
        }

        .input-area {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            background: #f0f2f5;
            border-radius: 20px;
            flex-direction: column;
            flex-shrink: 0;
            margin-top: 10px;
            border: 1px solid #d8dee8;
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            padding: 16px 18px;
            border: 2px solid #d0d8e5;
            border-radius: 16px;
            font-size: 18px;
            resize: none;
            font-family: inherit;
            min-height: 60px;
            max-height: 150px;
            background: white;
            color: #1e2a3a;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #6c8fc7;  /* Softer blue focus */
            box-shadow: 0 0 0 3px rgba(108, 143, 199, 0.1);
        }

        textarea::placeholder {
            color: #8a9bb0;
            font-size: 17px;
        }

        .input-tools {
            display: flex;
            gap: 10px;
        }

        .tool-btn {
            background: white;
            border: 2px solid #d0d8e5;
            border-radius: 16px;
            padding: 12px;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .tool-btn:hover {
            background: #e8ecf2;
            border-color: #9aabbf;
        }

        button {
            padding: 16px 28px;
            background: #6c8fc7;  /* Soft blue */
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            min-width: 100px;
            height: 56px;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 8px rgba(108, 143, 199, 0.2);
        }

        button:hover {
            background: #5a7bb0;
        }

        button:disabled {
            background: #b0c0d5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .image-preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
            padding: 12px;
            background: #e4e9f0;
            border-radius: 16px;
            max-height: 130px;
            overflow-y: auto;
        }
        
        .image-preview {
            position: relative;
            width: 80px;
            height: 80px;
            flex-shrink: 0;
        }
        
        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid white;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }
        
        .remove-image {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e06c6c;  /* Soft red */
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .remove-image:hover {
            background: #cc5555;
        }

        .status {
            padding: 14px 20px;
            background: #e3ebf5;  /* Soft blue background */
            color: #2c4b7a;  /* Darker blue for contrast */
            border-radius: 16px;
            margin-top: 12px;
            font-size: 17px;
            display: none;
            border: 1px solid #b8cde0;
            font-weight: 500;
        }

        .status.active {
            display: block;
        }

        .workflow-info {
            padding: 16px 25px;
            background: #f0f2f5;
            border-top: 1px solid #d0d5dd;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            color: #4a5a6e;
            font-size: 16px;
            flex-shrink: 0;
        }

        .workflow-info div {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .workflow-info span {
            color: #1e2a3a;
            font-weight: 600;
            font-size: 16px;
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 16px 20px;
            background: #eef2f6;
            border-radius: 24px;
            border-bottom-left-radius: 6px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 10px;
            height: 10px;
            background: #6b7a8f;
            border-radius: 50%;
            animation: typing 1.2s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-12px); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 42, 58, 0.95);  /* Dark but soft */
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
        }

        .modal img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 10px;
            z-index: 1001;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            backdrop-filter: blur(5px);
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Mobile-specific adjustments */
        @media (max-width: 600px) {
            body {
                padding: 8px;
            }
            
            .container {
                height: calc(100vh - 16px);
                border-radius: 22px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .header p {
                font-size: 15px;
            }
            
            .message-content {
                font-size: 17px;
                padding: 14px 18px;
            }
            
            .input-area {
                padding: 12px 15px;
            }
            
            textarea {
                font-size: 17px;
                padding: 14px;
                min-height: 55px;
            }
            
            textarea::placeholder {
                font-size: 16px;
            }
            
            .tool-btn {
                width: 52px;
                height: 52px;
                font-size: 22px;
                padding: 10px;
            }
            
            button {
                height: 52px;
                padding: 14px 20px;
                font-size: 17px;
                min-width: 85px;
            }
            
            .workflow-info {
                padding: 14px 20px;
                font-size: 15px;
                gap: 15px;
            }
            
            .workflow-info span {
                font-size: 15px;
            }
            
            .timestamp {
                font-size: 12px;
            }
            
            .file-attachment {
                font-size: 15px;
                padding: 10px 14px;
            }
        }

        /* Extra small devices */
        @media (max-width: 380px) {
            .message-content {
                font-size: 16px;
                padding: 12px 16px;
            }
            
            .tool-btn {
                width: 48px;
                height: 48px;
                font-size: 20px;
            }
            
            button {
                height: 48px;
                padding: 12px 16px;
                font-size: 16px;
                min-width: 75px;
            }
        }
    </style>
</head>
<body>
    <div class="modal" id="imageModal" onclick="closeModal()">
        <button class="modal-close">&times;</button>
        <img id="modalImage" src="" alt="Enlarged view">
    </div>

    <div class="container">
        <div class="header">
            <h1>AI Automation Interface</h1>
            <p>Connected to n8n workflow: AI Assistant</p>
        </div>

        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message bot-message">
                    <div class="message-wrapper">
                        <div class="message-content">
                            Hello! I'm your AI assistant. I can handle both text and images. How can I help you today?
                        </div>
                        <div class="timestamp">Just now</div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="image-preview-container" id="imagePreviewContainer" style="display: none;"></div>
                
                <div class="input-row">
                    <textarea 
                        id="userInput" 
                        placeholder="Type your message here..." 
                        rows="2"
                    ></textarea>
                    
                    <div class="input-tools">
                        <label class="tool-btn" title="Attach images">
                            📷
                            <input type="file" id="imageInput" accept="image/*" multiple style="display: none;" onchange="handleImageSelect(event)">
                        </label>
                        <button id="sendButton" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>

            <div class="status" id="status">
                Processing your request...
            </div>
        </div>

        <div class="workflow-info">
            <div>🔄 Workflow: <span>AI Agent</span></div>
            <div>⚡ Status: <span id="workflowStatus">Connected</span></div>
            <div>🆔 Latest Execution: <span>Ready</span></div>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');
        const status = document.getElementById('status');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const imageInput = document.getElementById('imageInput');
        const modal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        
        // Store selected images
        let selectedImages = [];

        // Updated webhook URL
        const WEBHOOK_URL = 'https://temp721.app.n8n.cloud/webhook/ai-agent-endpoint';

        // Handle image selection
        window.handleImageSelect = (event) => {
            const files = Array.from(event.target.files);
            
            files.forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        selectedImages.push({
                            file: file,
                            dataUrl: e.target.result,
                            name: file.name,
                            size: file.size
                        });
                        updateImagePreviews();
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            // Clear input to allow selecting same file again
            imageInput.value = '';
        };

        // Update image previews
        function updateImagePreviews() {
            if (selectedImages.length > 0) {
                imagePreviewContainer.style.display = 'flex';
                imagePreviewContainer.innerHTML = '';
                
                selectedImages.forEach((img, index) => {
                    const preview = document.createElement('div');
                    preview.className = 'image-preview';
                    preview.innerHTML = `
                        <img src="${img.dataUrl}" alt="${img.name}" onclick="openModal('${img.dataUrl}')">
                        <div class="remove-image" onclick="removeImage(${index})">×</div>
                    `;
                    imagePreviewContainer.appendChild(preview);
                });
            } else {
                imagePreviewContainer.style.display = 'none';
            }
        }

        // Remove image
        window.removeImage = (index) => {
            selectedImages.splice(index, 1);
            updateImagePreviews();
        };

        // Open image modal
        window.openModal = (imageUrl) => {
            modalImage.src = imageUrl;
            modal.classList.add('active');
        };

        // Close modal
        window.closeModal = () => {
            modal.classList.remove('active');
            modalImage.src = '';
        };

        // Close modal with escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeModal();
            }
        });

        // Add message to chat
        function addMessage(content, isUser = false, files = []) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper';
            
            // Add text content if exists
            if (content && content.trim() !== '') {
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.textContent = content;
                wrapper.appendChild(contentDiv);
            }
            
            // Add file attachments
            if (files.length > 0) {
                // Separate images from other files
                const images = files.filter(f => f.type?.startsWith('image/') || f.dataUrl);
                const otherFiles = files.filter(f => !f.type?.startsWith('image/') && !f.dataUrl);
                
                // Add images
                if (images.length > 0) {
                    const imagesDiv = document.createElement('div');
                    imagesDiv.className = 'message-images';
                    
                    images.forEach(img => {
                        const imgElement = document.createElement('img');
                        imgElement.src = img.dataUrl || img;
                        imgElement.className = 'message-image';
                        imgElement.onclick = () => openModal(imgElement.src);
                        imagesDiv.appendChild(imgElement);
                    });
                    
                    wrapper.appendChild(imagesDiv);
                }
                
                // Add other files as attachments
                if (otherFiles.length > 0) {
                    otherFiles.forEach(file => {
                        const attachmentDiv = document.createElement('div');
                        attachmentDiv.className = 'file-attachment';
                        attachmentDiv.innerHTML = `
                            <span class="file-icon">📎</span>
                            <span class="file-name">${file.name || 'Attachment'}</span>
                            <span class="file-size">${file.size ? `(${Math.round(file.size/1024)} KB)` : ''}</span>
                        `;
                        wrapper.appendChild(attachmentDiv);
                    });
                }
            }
            
            const timestamp = document.createElement('div');
            timestamp.className = 'timestamp';
            timestamp.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            wrapper.appendChild(timestamp);
            messageDiv.appendChild(wrapper);
            messagesContainer.appendChild(messageDiv);
            
            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Show typing indicator
        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'message bot-message';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = `
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            messagesContainer.appendChild(indicator);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Remove typing indicator
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            
            // Check if there's anything to send
            if (!message && selectedImages.length === 0) return;

            // Disable input and button
            userInput.disabled = true;
            sendButton.disabled = true;
            status.classList.add('active');

            // Add user message with files
            addMessage(message, true, selectedImages);
            
            // Clear input
            userInput.value = '';
            const imagesToSend = [...selectedImages];
            selectedImages = [];
            updateImagePreviews();

            // Show typing indicator
            showTypingIndicator();

            try {
                // Prepare form data for images
                const formData = new FormData();
                formData.append('message', message);
                formData.append('timestamp', new Date().toISOString());
                formData.append('sessionId', 'user-session-1');
                
                // Append images
                imagesToSend.forEach((img, index) => {
                    formData.append(`image_${index}`, img.file);
                });

                // Send to n8n webhook
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('Raw response from webhook:', data);
                
                // Remove typing indicator
                removeTypingIndicator();
                
                // Handle case where data is a JSON string that needs parsing
                let responseData = data;
                if (typeof data === 'string' && (data.trim().startsWith('{') || data.trim().startsWith('['))) {
                    try {
                        responseData = JSON.parse(data);
                        console.log('Parsed JSON string:', responseData);
                    } catch (e) {
                        console.log('Not a JSON string, keeping as is');
                    }
                }
                
                // Extract the response text
                let botResponse = '';
                if (typeof responseData === 'string') {
                    botResponse = responseData;
                } else if (responseData.result) {
                    botResponse = responseData.result;
                } else if (responseData.output) {
                    botResponse = responseData.output;
                } else if (responseData.message) {
                    botResponse = responseData.message;
                } else if (responseData.response) {
                    botResponse = responseData.response;
                } else if (responseData.text) {
                    botResponse = responseData.text;
                } else {
                    botResponse = JSON.stringify(responseData, null, 2);
                }
                
                addMessage(botResponse);

            } catch (error) {
                console.error('Error:', error);
                removeTypingIndicator();
                addMessage('Sorry, there was an error processing your request. Please try again.');
            } finally {
                // Re-enable input and button
                userInput.disabled = false;
                sendButton.disabled = false;
                status.classList.remove('active');
                userInput.focus();
            }
        }

        // Allow Enter key to send (but Shift+Enter for new line)
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Initial focus
        userInput.focus();

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Update workflow info
        document.querySelector('.workflow-info span:last-child').textContent = 'Ready';
    </script>
</body>
</html>

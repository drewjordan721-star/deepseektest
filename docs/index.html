<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AI Automation Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #f8f9fa;
            padding: 15px 20px;
            border-bottom: 1px solid #e9ecef;
            flex-shrink: 0;
        }

        .header h1 {
            color: #495057;
            font-size: 22px;
            margin-bottom: 5px;
        }

        .header p {
            color: #868e96;
            font-size: 13px;
        }

        .chat-container {
            padding: 15px;
            background: white;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px 5px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 0;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @media (max-width: 480px) {
            .message {
                max-width: 90%;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
        }

        .bot-message {
            align-self: flex-start;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
        }

        .message-content {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-message .message-content {
            background: #007bff;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot-message .message-content {
            background: #f1f3f5;
            color: #495057;
            border-bottom-left-radius: 4px;
        }

        .message-images {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 5px;
        }

        .message-image {
            width: 100%;
            max-width: 150px;
            max-height: 150px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid transparent;
            object-fit: cover;
        }

        @media (max-width: 480px) {
            .message-image {
                max-width: 120px;
                max-height: 120px;
            }
        }

        .user-message .message-image {
            border-color: rgba(255,255,255,0.3);
        }

        .message-image:hover {
            transform: scale(1.05);
        }

        .file-attachment {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: rgba(0,0,0,0.05);
            border-radius: 8px;
            margin-top: 5px;
            font-size: 12px;
        }

        .user-message .file-attachment {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .file-icon {
            font-size: 14px;
        }

        .file-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .timestamp {
            font-size: 10px;
            color: #adb5bd;
            margin-top: 3px;
            margin-bottom: 3px;
        }

        .user-message .timestamp {
            text-align: right;
        }

        .input-area {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 12px;
            flex-direction: column;
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            padding: 10px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
            resize: none;
            font-family: inherit;
            min-height: 40px;
            max-height: 100px;
        }

        textarea:focus {
            outline: none;
            border-color: #007bff;
        }

        .input-tools {
            display: flex;
            gap: 6px;
        }

        .tool-btn {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
        }

        .tool-btn:hover {
            background: #e9ecef;
            border-color: #adb5bd;
        }

        button {
            padding: 10px 18px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            min-width: 70px;
            height: 44px;
        }

        button:hover {
            background: #0056b3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .image-preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
            padding: 8px;
            background: #e9ecef;
            border-radius: 8px;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .image-preview {
            position: relative;
            width: 60px;
            height: 60px;
            flex-shrink: 0;
        }
        
        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }
        
        .remove-image {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #dc3545;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
        }

        .remove-image:hover {
            background: #c82333;
        }

        .status {
            padding: 8px 12px;
            background: #e7f5ff;
            color: #1864ab;
            border-radius: 8px;
            margin-top: 8px;
            font-size: 13px;
            display: none;
        }

        .status.active {
            display: block;
        }

        .workflow-info {
            padding: 12px 15px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            color: #868e96;
            font-size: 12px;
            flex-shrink: 0;
        }

        .workflow-info div {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .workflow-info span {
            color: #495057;
            font-weight: 500;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
            background: #f1f3f5;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #868e96;
            border-radius: 50%;
            animation: typing 1s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 10px;
            z-index: 1001;
        }

        /* Mobile-specific adjustments */
        @media (max-width: 480px) {
            body {
                padding: 5px;
            }
            
            .container {
                height: calc(100vh - 10px);
                border-radius: 15px;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .header p {
                font-size: 12px;
            }
            
            .message-content {
                font-size: 13px;
                padding: 8px 12px;
            }
            
            .input-area {
                padding: 8px;
            }
            
            textarea {
                font-size: 13px;
                padding: 8px;
            }
            
            .tool-btn {
                width: 40px;
                height: 40px;
                padding: 8px;
                font-size: 16px;
            }
            
            button {
                height: 40px;
                padding: 8px 12px;
                font-size: 13px;
                min-width: 60px;
            }
            
            .workflow-info {
                padding: 8px 12px;
                font-size: 11px;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="modal" id="imageModal" onclick="closeModal()">
        <button class="modal-close">&times;</button>
        <img id="modalImage" src="" alt="Enlarged view">
    </div>

    <div class="container">
        <div class="header">
            <h1>AI Automation Interface</h1>
            <p>Connected to n8n workflow: AI Assistant</p>
        </div>

        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message bot-message">
                    <div class="message-wrapper">
                        <div class="message-content">
                            Hello! I'm your AI assistant. I can handle both text and images. How can I help you today?
                        </div>
                        <div class="timestamp">Just now</div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="image-preview-container" id="imagePreviewContainer" style="display: none;"></div>
                
                <div class="input-row">
                    <textarea 
                        id="userInput" 
                        placeholder="Type your message here..." 
                        rows="2"
                    ></textarea>
                    
                    <div class="input-tools">
                        <label class="tool-btn" title="Attach images">
                            📷
                            <input type="file" id="imageInput" accept="image/*" multiple style="display: none;" onchange="handleImageSelect(event)">
                        </label>
                        <button id="sendButton" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>

            <div class="status" id="status">
                Processing your request...
            </div>
        </div>

        <div class="workflow-info">
            <div>🔄 Workflow: <span>AI Agent</span></div>
            <div>⚡ Status: <span id="workflowStatus">Connected</span></div>
            <div>🆔 Latest Execution: <span>Ready</span></div>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');
        const status = document.getElementById('status');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const imageInput = document.getElementById('imageInput');
        const modal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        
        // Store selected images
        let selectedImages = [];

        // Updated webhook URL - changed from drew721 to temp721
        const WEBHOOK_URL = 'https://temp721.app.n8n.cloud/webhook/ai-agent-endpoint';

        // Handle image selection
        window.handleImageSelect = (event) => {
            const files = Array.from(event.target.files);
            
            files.forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        selectedImages.push({
                            file: file,
                            dataUrl: e.target.result,
                            name: file.name,
                            size: file.size
                        });
                        updateImagePreviews();
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            // Clear input to allow selecting same file again
            imageInput.value = '';
        };

        // Update image previews
        function updateImagePreviews() {
            if (selectedImages.length > 0) {
                imagePreviewContainer.style.display = 'flex';
                imagePreviewContainer.innerHTML = '';
                
                selectedImages.forEach((img, index) => {
                    const preview = document.createElement('div');
                    preview.className = 'image-preview';
                    preview.innerHTML = `
                        <img src="${img.dataUrl}" alt="${img.name}" onclick="openModal('${img.dataUrl}')">
                        <div class="remove-image" onclick="removeImage(${index})">×</div>
                    `;
                    imagePreviewContainer.appendChild(preview);
                });
            } else {
                imagePreviewContainer.style.display = 'none';
            }
        }

        // Remove image
        window.removeImage = (index) => {
            selectedImages.splice(index, 1);
            updateImagePreviews();
        };

        // Open image modal
        window.openModal = (imageUrl) => {
            modalImage.src = imageUrl;
            modal.classList.add('active');
        };

        // Close modal
        window.closeModal = () => {
            modal.classList.remove('active');
            modalImage.src = '';
        };

        // Close modal with escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeModal();
            }
        });

        // Add message to chat
        function addMessage(content, isUser = false, files = []) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper';
            
            // Add text content if exists
            if (content && content.trim() !== '') {
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.textContent = content;
                wrapper.appendChild(contentDiv);
            }
            
            // Add file attachments
            if (files.length > 0) {
                // Separate images from other files
                const images = files.filter(f => f.type?.startsWith('image/') || f.dataUrl);
                const otherFiles = files.filter(f => !f.type?.startsWith('image/') && !f.dataUrl);
                
                // Add images
                if (images.length > 0) {
                    const imagesDiv = document.createElement('div');
                    imagesDiv.className = 'message-images';
                    
                    images.forEach(img => {
                        const imgElement = document.createElement('img');
                        imgElement.src = img.dataUrl || img;
                        imgElement.className = 'message-image';
                        imgElement.onclick = () => openModal(imgElement.src);
                        imagesDiv.appendChild(imgElement);
                    });
                    
                    wrapper.appendChild(imagesDiv);
                }
                
                // Add other files as attachments
                if (otherFiles.length > 0) {
                    otherFiles.forEach(file => {
                        const attachmentDiv = document.createElement('div');
                        attachmentDiv.className = 'file-attachment';
                        attachmentDiv.innerHTML = `
                            <span class="file-icon">📎</span>
                            <span class="file-name">${file.name || 'Attachment'}</span>
                            <span class="file-size">${file.size ? `(${Math.round(file.size/1024)} KB)` : ''}</span>
                        `;
                        wrapper.appendChild(attachmentDiv);
                    });
                }
            }
            
            const timestamp = document.createElement('div');
            timestamp.className = 'timestamp';
            timestamp.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            wrapper.appendChild(timestamp);
            messageDiv.appendChild(wrapper);
            messagesContainer.appendChild(messageDiv);
            
            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Show typing indicator
        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'message bot-message';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = `
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            messagesContainer.appendChild(indicator);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Remove typing indicator
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            
            // Check if there's anything to send
            if (!message && selectedImages.length === 0) return;

            // Disable input and button
            userInput.disabled = true;
            sendButton.disabled = true;
            status.classList.add('active');

            // Add user message with files
            addMessage(message, true, selectedImages);
            
            // Clear input
            userInput.value = '';
            const imagesToSend = [...selectedImages];
            selectedImages = [];
            updateImagePreviews();

            // Show typing indicator
            showTypingIndicator();

            try {
                // Prepare form data for images
                const formData = new FormData();
                formData.append('message', message);
                formData.append('timestamp', new Date().toISOString());
                formData.append('sessionId', 'user-session-1');
                
                // Append images
                imagesToSend.forEach((img, index) => {
                    formData.append(`image_${index}`, img.file);
                });

                // Send to n8n webhook with updated URL
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('Raw response from webhook:', data);
                
                // Remove typing indicator
                removeTypingIndicator();
                
                // Handle case where data is a JSON string that needs parsing
                let responseData = data;
                if (typeof data === 'string' && (data.trim().startsWith('{') || data.trim().startsWith('['))) {
                    try {
                        responseData = JSON.parse(data);
                        console.log('Parsed JSON string:', responseData);
                    } catch (e) {
                        console.log('Not a JSON string, keeping as is');
                    }
                }
                
                // Extract the response text
                let botResponse = '';
                if (typeof responseData === 'string') {
                    botResponse = responseData;
                } else if (responseData.result) {
                    botResponse = responseData.result;
                } else if (responseData.output) {
                    botResponse = responseData.output;
                } else if (responseData.message) {
                    botResponse = responseData.message;
                } else if (responseData.response) {
                    botResponse = responseData.response;
                } else if (responseData.text) {
                    botResponse = responseData.text;
                } else {
                    botResponse = JSON.stringify(responseData, null, 2);
                }
                
                addMessage(botResponse);

            } catch (error) {
                console.error('Error:', error);
                removeTypingIndicator();
                addMessage('Sorry, there was an error processing your request. Please try again.');
            } finally {
                // Re-enable input and button
                userInput.disabled = false;
                sendButton.disabled = false;
                status.classList.remove('active');
                userInput.focus();
            }
        }

        // Allow Enter key to send (but Shift+Enter for new line)
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Initial focus
        userInput.focus();

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Update workflow info
        document.querySelector('.workflow-info span:last-child').textContent = 'Ready';
    </script>
</body>
</html>

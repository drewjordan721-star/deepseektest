<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>AI Automation Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #2b2f3a;  /* Dark background for eye care */
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #1e2229;  /* Dark container background */
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            height: calc(100vh - 24px);
            display: flex;
            flex-direction: column;
            border: 1px solid #3a4050;
        }

        .header {
            background: #252a33;  /* Dark header */
            padding: 20px 25px;
            border-bottom: 1px solid #3a4050;
            flex-shrink: 0;
        }

        .header h1 {
            color: #e6e9f0;  /* Light text for contrast */
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            color: #aab3c5;  /* Softer light text */
            font-size: 18px;
        }

        .chat-container {
            padding: 20px;
            background: #1e2229;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
            scrollbar-width: thin;
            scrollbar-color: #4a5266 #2a2f3a;
        }

        .messages::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-track {
            background: #2a2f3a;
            border-radius: 10px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #4a5266;
            border-radius: 10px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @media (max-width: 600px) {
            .message {
                max-width: 90%;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
        }

        .bot-message {
            align-self: flex-start;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
        }

        .message-content {
            padding: 18px 22px;
            border-radius: 24px;
            font-size: 20px;  /* Increased font size */
            line-height: 1.6;  /* Better line spacing for readability */
            word-wrap: break-word;
            font-weight: 400;
            white-space: pre-wrap;  /* Preserves line breaks and spacing */
            font-family: inherit;
        }

        /* Dark mode colors with better contrast */
        .user-message .message-content {
            background: #2b4b6f;  /* Darker blue for dark mode */
            color: #f0f4fa;  /* Light text */
            border-bottom-right-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .bot-message .message-content {
            background: #2f3542;  /* Dark gray-blue */
            color: #e6eaf0;  /* Light text */
            border-bottom-left-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .message-images {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .message-image {
            width: 100%;
            max-width: 220px;
            max-height: 220px;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid #3a4050;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        @media (max-width: 600px) {
            .message-image {
                max-width: 180px;
                max-height: 180px;
            }
        }

        .message-image:hover {
            transform: scale(1.03);
        }

        .message-actions {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            justify-content: flex-end;
        }

        .retry-btn {
            background: #3a4050;
            border: 1px solid #4a5568;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 16px;
            color: #cbd5e0;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            align-self: flex-start;
        }

        .retry-btn:hover {
            background: #4a5568;
            color: white;
        }

        .file-attachment {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            margin-top: 10px;
            font-size: 18px;
            border: 1px solid #3a4050;
        }

        .user-message .file-attachment {
            background: rgba(255,255,255,0.1);
            color: #e6eaf0;
        }

        .file-icon {
            font-size: 22px;
        }

        .file-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 500;
        }

        .file-size {
            color: #9aa5b8;
            font-size: 16px;
        }

        .timestamp {
            font-size: 14px;
            color: #8a95aa;  /* Lighter for dark mode */
            margin-top: 6px;
            margin-bottom: 4px;
            font-weight: 400;
        }

        .user-message .timestamp {
            text-align: right;
        }

        .input-area {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            background: #252a33;
            border-radius: 20px;
            flex-direction: column;
            flex-shrink: 0;
            margin-top: 10px;
            border: 1px solid #3a4050;
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            padding: 18px 20px;
            border: 2px solid #3a4050;
            border-radius: 18px;
            font-size: 20px;  /* Larger font */
            resize: none;
            font-family: inherit;
            min-height: 70px;
            max-height: 180px;
            background: #1a1e26;
            color: #e6eaf0;
            transition: border-color 0.2s;
            line-height: 1.5;
        }

        textarea:focus {
            outline: none;
            border-color: #4f7eb3;
            box-shadow: 0 0 0 3px rgba(79, 126, 179, 0.2);
        }

        textarea::placeholder {
            color: #6b758b;
            font-size: 19px;
        }

        .input-tools {
            display: flex;
            gap: 10px;
        }

        .tool-btn {
            background: #1a1e26;
            border: 2px solid #3a4050;
            border-radius: 18px;
            padding: 14px;
            cursor: pointer;
            font-size: 26px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            color: #e6eaf0;
        }

        .tool-btn:hover {
            background: #2a2f3a;
            border-color: #4f7eb3;
        }

        button {
            padding: 18px 32px;
            background: #2b4b6f;
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            min-width: 120px;
            height: 64px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        button:hover {
            background: #35638f;
        }

        button:disabled {
            background: #3a4050;
            cursor: not-allowed;
            box-shadow: none;
            color: #8a95aa;
        }

        .image-preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
            padding: 15px;
            background: #1a1e26;
            border-radius: 18px;
            max-height: 140px;
            overflow-y: auto;
            border: 1px solid #3a4050;
        }
        
        .image-preview {
            position: relative;
            width: 90px;
            height: 90px;
            flex-shrink: 0;
        }
        
        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #3a4050;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .remove-image {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #b34b4b;
            color: white;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid #1a1e26;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .remove-image:hover {
            background: #cc5555;
        }

        .status {
            padding: 16px 22px;
            background: #2b4b6f;
            color: #f0f4fa;
            border-radius: 18px;
            margin-top: 12px;
            font-size: 19px;
            display: none;
            border: 1px solid #4f7eb3;
            font-weight: 500;
        }

        .status.active {
            display: block;
        }

        .workflow-info {
            padding: 18px 25px;
            background: #252a33;
            border-top: 1px solid #3a4050;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            color: #aab3c5;
            font-size: 18px;
            flex-shrink: 0;
        }

        .workflow-info div {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .workflow-info span {
            color: #e6eaf0;
            font-weight: 600;
            font-size: 18px;
        }

        .typing-indicator {
            display: flex;
            gap: 8px;
            padding: 18px 22px;
            background: #2f3542;
            border-radius: 24px;
            border-bottom-left-radius: 6px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 12px;
            height: 12px;
            background: #aab3c5;
            border-radius: 50%;
            animation: typing 1.2s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-12px); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 12, 18, 0.98);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal.active {
            display: flex;
        }

        .modal img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            border-radius: 18px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .modal-close {
            position: absolute;
            top: 25px;
            right: 25px;
            color: white;
            font-size: 44px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 10px;
            z-index: 1001;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(30, 35, 45, 0.7);
            border-radius: 50%;
            backdrop-filter: blur(5px);
            border: 1px solid #4a5568;
        }

        .modal-close:hover {
            background: rgba(50, 55, 70, 0.9);
        }

        /* Mobile-specific adjustments */
        @media (max-width: 600px) {
            body {
                padding: 8px;
            }
            
            .container {
                height: calc(100vh - 16px);
                border-radius: 22px;
            }
            
            .header h1 {
                font-size: 28px;
            }
            
            .header p {
                font-size: 17px;
            }
            
            .message-content {
                font-size: 19px;
                padding: 16px 20px;
            }
            
            .input-area {
                padding: 14px 16px;
            }
            
            textarea {
                font-size: 19px;
                padding: 16px;
                min-height: 65px;
            }
            
            textarea::placeholder {
                font-size: 18px;
            }
            
            .tool-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
                padding: 12px;
            }
            
            button {
                height: 60px;
                padding: 16px 24px;
                font-size: 19px;
                min-width: 100px;
            }
            
            .workflow-info {
                padding: 16px 20px;
                font-size: 17px;
                gap: 18px;
            }
            
            .workflow-info span {
                font-size: 17px;
            }
            
            .timestamp {
                font-size: 13px;
            }
            
            .file-attachment {
                font-size: 17px;
                padding: 12px 16px;
            }
            
            .retry-btn {
                font-size: 15px;
                padding: 6px 14px;
            }
        }

        /* Extra small devices */
        @media (max-width: 380px) {
            .message-content {
                font-size: 18px;
                padding: 14px 18px;
            }
            
            .tool-btn {
                width: 56px;
                height: 56px;
                font-size: 22px;
            }
            
            button {
                height: 56px;
                padding: 14px 20px;
                font-size: 18px;
                min-width: 90px;
            }
        }
    </style>
</head>
<body>
    <div class="modal" id="imageModal" onclick="closeModal()">
        <button class="modal-close">&times;</button>
        <img id="modalImage" src="" alt="Enlarged view">
    </div>

    <div class="container">
        <div class="header">
            <h1>AI Automation Interface</h1>
            <p>Connected to n8n workflow: AI Assistant</p>
        </div>

        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message bot-message">
                    <div class="message-wrapper">
                        <div class="message-content">
                            Hello! I'm your AI assistant. I can handle both text and images. How can I help you today?
                        </div>
                        <div class="timestamp">Just now</div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="image-preview-container" id="imagePreviewContainer" style="display: none;"></div>
                
                <div class="input-row">
                    <textarea 
                        id="userInput" 
                        placeholder="Type your message here... (Shift+Enter for new line)" 
                        rows="2"
                    ></textarea>
                    
                    <div class="input-tools">
                        <label class="tool-btn" title="Attach images">
                            📷
                            <input type="file" id="imageInput" accept="image/*" multiple style="display: none;" onchange="handleImageSelect(event)">
                        </label>
                        <button id="sendButton" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>

            <div class="status" id="status">
                Processing your request...
            </div>
        </div>

        <div class="workflow-info">
            <div>🔄 Workflow: <span>AI Agent</span></div>
            <div>⚡ Status: <span id="workflowStatus">Connected</span></div>
            <div>🆔 Latest Execution: <span>Ready</span></div>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');
        const status = document.getElementById('status');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const imageInput = document.getElementById('imageInput');
        const modal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        
        // Store selected images and pending message
        let selectedImages = [];
        let pendingMessage = ''; // Store message if send fails

        // Updated webhook URL
        const WEBHOOK_URL = 'https://temp721.app.n8n.cloud/webhook/ai-agent-endpoint';

        // Handle image selection
        window.handleImageSelect = (event) => {
            const files = Array.from(event.target.files);
            
            files.forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        selectedImages.push({
                            file: file,
                            dataUrl: e.target.result,
                            name: file.name,
                            size: file.size
                        });
                        updateImagePreviews();
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            // Clear input to allow selecting same file again
            imageInput.value = '';
        };

        // Update image previews
        function updateImagePreviews() {
            if (selectedImages.length > 0) {
                imagePreviewContainer.style.display = 'flex';
                imagePreviewContainer.innerHTML = '';
                
                selectedImages.forEach((img, index) => {
                    const preview = document.createElement('div');
                    preview.className = 'image-preview';
                    preview.innerHTML = `
                        <img src="${img.dataUrl}" alt="${img.name}" onclick="openModal('${img.dataUrl}')">
                        <div class="remove-image" onclick="removeImage(${index})">×</div>
                    `;
                    imagePreviewContainer.appendChild(preview);
                });
            } else {
                imagePreviewContainer.style.display = 'none';
            }
        }

        // Remove image
        window.removeImage = (index) => {
            selectedImages.splice(index, 1);
            updateImagePreviews();
        };

        // Open image modal
        window.openModal = (imageUrl) => {
            modalImage.src = imageUrl;
            modal.classList.add('active');
        };

        // Close modal
        window.closeModal = () => {
            modal.classList.remove('active');
            modalImage.src = '';
        };

        // Close modal with escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeModal();
            }
        });

        // Add message to chat with retry button
        function addMessage(content, isUser = false, files = [], messageId = null, showRetry = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            if (messageId) {
                messageDiv.dataset.messageId = messageId;
            }
            
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper';
            
            // Add text content if exists - use innerHTML to preserve line breaks
            if (content && content.trim() !== '') {
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                // Use innerHTML to preserve line breaks and convert them to <br>
                contentDiv.innerHTML = content.replace(/\n/g, '<br>').replace(/ /g, ' ');
                wrapper.appendChild(contentDiv);
            }
            
            // Add file attachments
            if (files && files.length > 0) {
                // Separate images from other files
                const images = files.filter(f => f.type?.startsWith('image/') || f.dataUrl);
                const otherFiles = files.filter(f => !f.type?.startsWith('image/') && !f.dataUrl);
                
                // Add images
                if (images.length > 0) {
                    const imagesDiv = document.createElement('div');
                    imagesDiv.className = 'message-images';
                    
                    images.forEach(img => {
                        const imgElement = document.createElement('img');
                        imgElement.src = img.dataUrl || img;
                        imgElement.className = 'message-image';
                        imgElement.onclick = () => openModal(imgElement.src);
                        imagesDiv.appendChild(imgElement);
                    });
                    
                    wrapper.appendChild(imagesDiv);
                }
                
                // Add other files as attachments
                if (otherFiles.length > 0) {
                    otherFiles.forEach(file => {
                        const attachmentDiv = document.createElement('div');
                        attachmentDiv.className = 'file-attachment';
                        attachmentDiv.innerHTML = `
                            <span class="file-icon">📎</span>
                            <span class="file-name">${file.name || 'Attachment'}</span>
                            <span class="file-size">${file.size ? `(${Math.round(file.size/1024)} KB)` : ''}</span>
                        `;
                        wrapper.appendChild(attachmentDiv);
                    });
                }
            }
            
            const timestamp = document.createElement('div');
            timestamp.className = 'timestamp';
            timestamp.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            wrapper.appendChild(timestamp);
            
            // Add retry button for failed messages or user messages
            if (showRetry && isUser) {
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'message-actions';
                
                const retryBtn = document.createElement('button');
                retryBtn.className = 'retry-btn';
                retryBtn.innerHTML = '↻ Retry';
                retryBtn.onclick = () => retryMessage(content, files, messageId);
                
                actionsDiv.appendChild(retryBtn);
                wrapper.appendChild(actionsDiv);
            }
            
            messageDiv.appendChild(wrapper);
            messagesContainer.appendChild(messageDiv);
            
            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            return messageDiv;
        }

        // Retry a failed message
        async function retryMessage(content, files, messageId) {
            // Remove the old message
            const oldMessage = document.querySelector(`[data-message-id="${messageId}"]`);
            if (oldMessage) {
                oldMessage.remove();
            }
            
            // Set the pending content
            userInput.value = content;
            selectedImages = files ? [...files] : [];
            updateImagePreviews();
            
            // Auto-send after a short delay
            setTimeout(() => {
                sendMessage();
            }, 100);
        }

        // Show typing indicator
        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'message bot-message';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = `
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            messagesContainer.appendChild(indicator);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Remove typing indicator
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        async function sendMessage() {
            const message = userInput.value;
            const imagesToSend = [...selectedImages];
            
            // Check if there's anything to send
            if (!message.trim() && imagesToSend.length === 0) return;

            // Disable input and button
            userInput.disabled = true;
            sendButton.disabled = true;
            status.classList.add('active');

            // Generate unique ID for this message
            const messageId = Date.now().toString();

            // Clear input and previews immediately
            userInput.value = '';
            selectedImages = [];
            updateImagePreviews();

            try {
                // Prepare form data for images
                const formData = new FormData();
                formData.append('message', message);
                formData.append('timestamp', new Date().toISOString());
                formData.append('sessionId', 'user-session-1');
                
                // Append images
                imagesToSend.forEach((img, index) => {
                    formData.append(`image_${index}`, img.file);
                });

                // Show typing indicator
                showTypingIndicator();

                // Send to n8n webhook
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('Raw response from webhook:', data);
                
                // Remove typing indicator
                removeTypingIndicator();
                
                // Handle case where data is a JSON string that needs parsing
                let responseData = data;
                if (typeof data === 'string' && (data.trim().startsWith('{') || data.trim().startsWith('['))) {
                    try {
                        responseData = JSON.parse(data);
                        console.log('Parsed JSON string:', responseData);
                    } catch (e) {
                        console.log('Not a JSON string, keeping as is');
                    }
                }
                
                // Extract the response text
                let botResponse = '';
                if (typeof responseData === 'string') {
                    botResponse = responseData;
                } else if (responseData.result) {
                    botResponse = responseData.result;
                } else if (responseData.output) {
                    botResponse = responseData.output;
                } else if (responseData.message) {
                    botResponse = responseData.message;
                } else if (responseData.response) {
                    botResponse = responseData.response;
                } else if (responseData.text) {
                    botResponse = responseData.text;
                } else {
                    botResponse = JSON.stringify(responseData, null, 2);
                }
                
                // Add user message (successful)
                addMessage(message, true, imagesToSend, messageId, false);
                
                // Add bot response
                addMessage(botResponse, false);

            } catch (error) {
                console.error('Error:', error);
                removeTypingIndicator();
                
                // Add user message with retry button (failed)
                addMessage(message, true, imagesToSend, messageId, true);
                
                // Show error status briefly
                status.textContent = 'Failed to send. Click retry to try again.';
                status.classList.add('active');
                setTimeout(() => {
                    status.classList.remove('active');
                    status.textContent = 'Processing your request...';
                }, 3000);
                
            } finally {
                // Re-enable input and button
                userInput.disabled = false;
                sendButton.disabled = false;
                userInput.focus();
            }
        }

        // Handle Enter key (Shift+Enter for new line, Enter to send)
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Initial focus
        userInput.focus();

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Update workflow info
        document.querySelector('.workflow-info span:last-child').textContent = 'Ready';
    </script>
</body>
</html>

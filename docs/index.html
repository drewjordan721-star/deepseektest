<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>

<style>
body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    background-color: #343541;
    color: #fff;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

#chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.message {
    max-width: 700px;
    margin: 10px auto;
    padding: 14px 18px;
    border-radius: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
}

.user {
    background-color: #0b93f6;
    margin-left: auto;
}

.bot {
    background-color: #444654;
    margin-right: auto;
}

#input-container {
    display: flex;
    padding: 15px;
    background: #40414f;
}

#input {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
}

button {
    margin-left: 10px;
    padding: 14px 20px;
    border: none;
    border-radius: 10px;
    background-color: #19c37d;
    color: white;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background-color: #17a96b;
}
</style>
</head>

<body>

<div id="chat-container"></div>

<div id="input-container">
    <input id="input" type="text" placeholder="Send a message..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
const chatContainer = document.getElementById('chat-container');
const input = document.getElementById('input');

// ✅ YOUR N8N AI AGENT URL (ALREADY SET)
const API_URL = "https://bayal.app.n8n.cloud/webhook/e9500a33-2854-4c10-88e6-b38a5bd888ff/chat";

function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = 'message ' + sender;
    div.innerText = text;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, 'user');
    input.value = '';

    const loading = document.createElement('div');
    loading.className = 'message bot';
    loading.innerText = 'Typing...';
    chatContainer.appendChild(loading);

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                chatInput: message
            })
        });

        const data = await response.json();

        chatContainer.removeChild(loading);

        // n8n AI Agent usually returns this:
        const reply = data.output || data.reply || JSON.stringify(data);

        addMessage(reply, 'bot');

    } catch (error) {
        chatContainer.removeChild(loading);
        addMessage("Error connecting to server.", 'bot');
        console.error(error);
    }
}

// Enter key support
input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
